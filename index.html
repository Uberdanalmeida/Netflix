<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <title>Netflix - Quem está assistindo?</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="page-index">
    <header role="banner" class="top-navigation">
      <img
        src="assets/logo-netflix.png"
        alt="Logotipo da Netflix"
        class="logo"
      />
    </header>

    <main class="profile-gate-container">
      <section class="profile-selection">
        <h1>Filmes, séries e muito mais, sem limites</h1>
        <h2>Quem está assistindo?</h2>

        <nav aria-label="Seleção de perfis">
          <ul class="profile-list">
            <li class="profile-item">
              <a href="catalogo.html" class="profile-link">
                <figure class="profile-avatar">
                  <img src="assets/perfil-1.png" alt="Avatar de Uberdan" />
                  <figcaption>Uberdan</figcaption>
                </figure>
              </a>
            </li>

            <li class="profile-item">
              <a href="catalogo.html" class="profile-link">
                <figure class="profile-avatar">
                  <img src="assets/perfil-infantil.png" alt="Avatar de Lucas" />
                  <figcaption>Lucas</figcaption>
                </figure>
              </a>
            </li>

            <li class="profile-item" id="btn-adicionar-perfil">
              <button
                class="add-profile-btn"
                aria-label="Adicionar novo perfil"
              >
                <div class="icon-wrapper">
                  <i class="bx bxs-plus-circle"></i>
                </div>
                <span>Adicionar Perfil</span>
              </button>
            </li>
          </ul>
        </nav>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
