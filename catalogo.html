<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Netflix - Início</title>
  </head>
  <body>
    <header class="nav-catalogo">
      <div class="nav-left">
        <img src="assets/logo-netflix.png" alt="Netflix" class="logo" />
        <nav>
          <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Séries</a></li>
            <li><a href="#">Filmes</a></li>
            <li><a href="#">Bombando</a></li>
            <li><a href="#">Minha lista</a></li>
          </ul>
        </nav>
      </div>
      <div class="nav-right">
        <i class="bx bx-search"></i>
        <span>Uberdan</span>
        <img src="assets/perfil-1.png" alt="Perfil" class="nav-avatar" />
      </div>
    </header>

    <main>
      <section class="featured-banner">
        <div class="featured-content">
          <h1 class="featured-title">Stranger Things</h1>
          <p class="featured-description">
            Quando um garoto desaparece, uma cidade pequena descobre um mistério
            envolvendo experimentos secretos, forças sobrenaturais
            aterrorizantes e uma garotinha estranha.
          </p>
          <div class="featured-buttons">
            <button class="btn-play">
              <i class="bx bx-play"></i> Assistir
            </button>
            <button class="btn-info">
              <i class="bx bx-info-circle"></i> Mais Informações
            </button>
          </div>
        </div>
      </section>

      <section class="movie-row">
        <h2>Minha Lista</h2>
        <div class="movie-cards">
          <div class="card">
            <img
              src="https://via.placeholder.com/200x300?text=Filme+1"
              alt="Capa"
            />
          </div>
          <div class="card">
            <img
              src="https://via.placeholder.com/200x300?text=Filme+2"
              alt="Capa"
            />
          </div>
          <div class="card">
            <img
              src="https://via.placeholder.com/200x300?text=Filme+3"
              alt="Capa"
            />
          </div>
          <div class="card">
            <img
              src="https://via.placeholder.com/200x300?text=Filme+4"
              alt="Capa"
            />
          </div>
          <div class="card">
            <img
              src="https://via.placeholder.com/200x300?text=Filme+5"
              alt="Capa"
            />
          </div>
          <div class="card">
            <img
              src="https://via.placeholder.com/200x300?text=Filme+6"
              alt="Capa"
            />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
